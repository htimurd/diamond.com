<!DOCTYPE html>
<html>
<head>
    <title>Diamond Messenger</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #1c1c1c; --card: #2c2c2c; --text: #ffffff;
            --accent: #2481cc; --input: #333333;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Auth Style */
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: var(--input); border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--accent); border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Messenger Style */
        #messenger { display: flex; width: 100vw; height: 100vh; }
        .sidebar { width: 250px; background: var(--card); border-right: 1px solid #444; padding: 15px; }
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; }
        .messages { flex-grow: 1; padding: 20px; overflow-y: auto; background: #141414; }
        .msg { margin-bottom: 10px; padding: 8px 12px; background: var(--input); border-radius: 10px; width: fit-content; }
        .input-row { padding: 15px; display: flex; background: var(--card); }
    </style>
</head>
<body>

    <div id="authBox" class="auth-box">
        <h2>Diamond Messenger</h2>
        <input type="text" id="uName" placeholder="Имя">
        <input type="password" id="uPass" placeholder="Пароль">
        <button onclick="auth('register')">Создать аккаунт</button>
        <button onclick="auth('login')" style="background:none; margin-top:10px;">Войти</button>
    </div>

    <div id="messenger" class="hidden">
        <div class="sidebar">
            <h3>Группы</h3>
            <div onclick="joinGroup('General')" style="cursor:pointer; color:var(--accent)"># General</div>
            <div onclick="joinGroup('Diamond Inc')" style="cursor:pointer; margin-top:10px;"># Diamond Inc</div>
        </div>
        <div class="chat-area">
            <div class="messages" id="msgBox"></div>
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Напишите сообщение...">
                <button onclick="send()" style="width:80px; margin-left:10px;">Send</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentUser = null;
        let currentGroup = 'General';

        async function auth(type) {
            const name = document.getElementById('uName').value;
            const password = document.getElementById('uPass').value;
            const res = await fetch(`/api/${type}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, password })
            });
            const data = await res.json();
            if(data.success) {
                currentUser = data.user;
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('messenger').classList.remove('hidden');
                joinGroup('General');
            } else { alert(data.error); }
        }

        function joinGroup(name) {
            currentGroup = name;
            document.getElementById('msgBox').innerHTML = `<p align="center">Вы вошли в группу ${name}</p>`;
            socket.emit('join_group', name);
        }

        function send() {
            const text = document.getElementById('msgInput').value;
            if(!text) return;
            socket.emit('send_msg', {
                group: currentGroup,
                text: text,
                user: currentUser.Name,
                verify: currentUser.Verify
            });
            document.getElementById('msgInput').value = '';
        }

        socket.on('receive_msg', (data) => {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${data.user}${data.verify ? ' ✓' : ''}:</b> ${data.text}`;
            document.getElementById('msgBox').appendChild(div);
        });
    </script>
</body>
</html>
